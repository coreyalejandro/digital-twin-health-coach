name: ci

# Safety-critical gates. The adversarial battery and compliance checks must pass
# before any deploy (report §2.4: "adversarial query battery runs on every
# deployment; failure blocks release").

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Unit & integration tests
        run: node --test

      - name: Red-team adversarial battery (blocks release on failure)
        run: node --test redteam/*.test.ts

      - name: Compliance checks (secret/PII scan, supply-chain, prompt safety)
        run: node scripts/ci-checks.ts

      - name: Integration verification
        run: node scripts/verify.ts
